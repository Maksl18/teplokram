version: "3.8"

services:
  app:
    container_name: teplokram-app-stage
    image: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}
    restart: always
    depends_on:
      - mysql
    environment:
      - VIRTUAL_HOST=${VIRTUAL_URL}
      - LETSENCRYPT_HOST=${VIRTUAL_URL}
    volumes:
      - ./storage/app/public/:/var/www/html/storage/app/public/
    networks:
      - webproxy

  mysql:
    image: mysql:8.0
    container_name: teplokram-db-stage
    restart: unless-stopped
    volumes:
      - ./docker-compose/mysql/database:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --sort_buffer_size=256M --max_allowed_packet=32505856
    environment:
      MYSQL_DATABASE: ${OPENCART_DB_DATABASE}
      MYSQL_USER: ${OPENCART_DB_USERNAME}
      MYSQL_PASSWORD: ${OPENCART_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${OPENCART_DB_PASSWORD}
      SERVICE_TAGS: prod
      SERVICE_NAME: mysql
    networks:
      - webproxy
    ports:
      - "3306:3306"

networks:
  webproxy:
    external: true

